<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept Visualizer | Authentication</title>
    <style>
        :root {
            /* Palette */
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --bg-panel: #020617;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --radius: 12px;
            
            /* Animation Speed */
            --speed: 0.3s;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Left Side --- */
        .brand-side {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at 70% 30%, #1e1b4b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            overflow: hidden;
        }

        canvas#bg-canvas {
            position: absolute; inset: 0;
            opacity: 0.4; pointer-events: none;
        }

        .brand-content {
            position: relative; z-index: 2;
            max-width: 500px;
            animation: fadeIn 1s ease-out;
        }

        .logo { font-weight: 700; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; color: white; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), #a855f7); border-radius: 8px; display: grid; place-items: center; }
        
        h1 { font-size: 3rem; line-height: 1.1; margin-bottom: 1rem; background: linear-gradient(to right, #fff, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.tagline { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; }

        /* --- Right Side --- */
        .auth-side {
            width: 500px;
            background-color: var(--bg-panel);
            display: flex; align-items: center; justify-content: center;
            padding: 2rem;
            box-shadow: -10px 0 40px rgba(0,0,0,0.3);
            position: relative; z-index: 10;
        }

        .auth-wrapper { width: 100%; max-width: 380px; }

        /* Sliding Tabs */
        .auth-toggle {
            position: relative;
            background: rgba(255,255,255,0.03);
            padding: 4px;
            border-radius: 50px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            display: flex;
        }

        /* The moving background pill */
        .toggle-bg {
            position: absolute;
            top: 4px; left: 4px;
            height: calc(100% - 8px);
            width: calc(50% - 4px);
            background: var(--primary);
            border-radius: 50px;
            transition: transform var(--speed) var(--ease);
            z-index: 1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .toggle-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            z-index: 2;
            transition: color 0.2s;
        }

        .toggle-btn.active { color: white; }

        /* Social Buttons */
        .btn-social {
            width: 100%; padding: 12px;
            border-radius: var(--radius); border: none;
            background: white; color: #0f172a;
            margin-bottom: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: transform 0.1s;
        }
        .btn-social:hover { background: #f1f5f9; transform: translateY(-1px); }
        .btn-social:active { transform: translateY(0); }

        .divider {
            display: flex; align-items: center; margin: 1.5rem 0;
            color: var(--text-muted); font-size: 0.8rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .divider span { padding: 0 10px; }

        /* Form & Sliding Fields */
        .form-group { margin-bottom: 1.25rem; }
        
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 500; }
        
        input {
            width: 100%; padding: 12px 16px;
            background: #0f172a; border: 1px solid var(--border);
            border-radius: var(--radius); color: white; font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); }

        /* The Sliding Name Field Wrapper */
        .name-wrapper {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-10px);
            transition: all var(--speed) var(--ease);
        }

        .name-wrapper.open {
            max-height: 100px; /* Approx height for content */
            opacity: 1;
            transform: translateY(0);
            margin-bottom: 1.25rem; /* Reset margin when open */
        }

        .btn-primary {
            width: 100%; padding: 12px;
            border-radius: var(--radius); border: none;
            background: var(--primary); color: white;
            font-weight: 600; cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* Loading Overlay */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: var(--radius); z-index: 20;
            backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        /* Animations */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .brand-side { display: none; }
            .auth-side { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Left Side -->
    <div class="brand-side">
        <canvas id="bg-canvas"></canvas>
        <div class="brand-content">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                Concept Visualizer
            </div>
            <h1>Connect ideas.<br>Build reality.</h1>
            <p class="tagline">The professional workspace for visualizing complex architectures. Join the platform powering the next generation of design.</p>
        </div>
    </div>

    <!-- Right Side -->
    <div class="auth-side">
        <div class="auth-wrapper">
            
            <!-- Sliding Tabs -->
            <div class="auth-toggle">
                <div class="toggle-bg" id="tab-bg"></div>
                <button class="toggle-btn active" id="btn-login" onclick="app.setMode('login')">Log In</button>
                <button class="toggle-btn" id="btn-signup" onclick="app.setMode('signup')">Sign Up</button>
            </div>

            <!-- Social -->
            <!-- <button class="btn-social" onclick="app.simulateLogin('Google')">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <div class="divider"><span>OR CONTINUE WITH EMAIL</span></div> -->

            <!-- Auth Form -->
            <form id="auth-form" onsubmit="event.preventDefault(); app.handleSubmit();">
                
                <!-- SLIDING NAME FIELD -->
                <div class="name-wrapper" id="name-container">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="input-name" placeholder="e.g. Parth">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="input-email" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="input-pass" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" id="btn-submit">Log In</button>
            </form>

            <!-- Overlay -->
            <div class="overlay" id="status-overlay">
                <div class="spinner"></div>
                <h3 id="status-text">Authenticating...</h3>
            </div>

        </div>
    </div>

    <script>
class App {
    constructor() {
        this.mode = 'login';
        this.els = {
            tabBg: document.getElementById('tab-bg'),
            btnLogin: document.getElementById('btn-login'),
            btnSignup: document.getElementById('btn-signup'),
            nameContainer: document.getElementById('name-container'),
            btnSubmit: document.getElementById('btn-submit'),
            overlay: document.getElementById('status-overlay'),
            statusText: document.getElementById('status-text'),
            inputs: {
                name: document.getElementById('input-name'),
                email: document.getElementById('input-email'),
                pass: document.getElementById('input-pass')
            },
            form: document.getElementById('auth-form')
        };
    }

    setMode(mode) {
        this.mode = mode;
        this.resetForm();
        if (mode === 'login') {
            this.els.tabBg.style.transform = 'translateX(0)';
            this.els.btnLogin.classList.add('active');
            this.els.btnSignup.classList.remove('active');
            this.els.nameContainer.classList.remove('open');
            this.els.inputs.name.required = false;
            this.els.btnSubmit.textContent = 'Log In';
        } else {
            this.els.tabBg.style.transform = 'translateX(100%)';
            this.els.btnSignup.classList.add('active');
            this.els.btnLogin.classList.remove('active');
            this.els.nameContainer.classList.add('open');
            this.els.inputs.name.required = true;
            this.els.btnSubmit.textContent = 'Create Account';
        }
    }

   async handleSubmit() {
    const email = this.els.inputs.email.value.trim();
    const pass = this.els.inputs.pass.value;
    const name = this.els.inputs.name.value.trim();

    if(!email.includes('@')) { alert('Invalid Email'); return; }
    if(pass.length < 6) { alert('Password too short'); return; }
    if(this.mode === 'signup' && name === '') { alert('Name required'); return; }

    this.els.overlay.classList.add('active');
    this.els.statusText.textContent = (this.mode === 'login') ? 'Logging in...' : 'Creating account...';

    try {
        if(this.mode === 'signup') {
            // Save email for OTP verification
            localStorage.setItem('signupEmail', email);

            // Send signup request
            const res = await fetch('http://localhost:3000/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password: pass, name })
            });
            const data = await res.json(); // <-- parse JSON

            if(data.success) {
                alert('OTP sent! Redirecting to verification page...');
                window.location.href = 'opt.html';
            } else {
                throw new Error(data.message || 'Error sending OTP');
            }

        } else {
            // LOGIN
            const res = await fetch('http://localhost:3000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password: pass })
            });
            const data = await res.json();
            if(data.success) {
                alert('Login successful ✅');
                this.resetForm();
                localStorage.setItem("userName", data.name);
                localStorage.setItem("userEmail", data.email);
                 window.location.href = '../Product/index.html';
            } else {
                throw new Error(data.message || 'Login failed');
            }
        }
    } catch(err) {
        alert(err.message);
    } finally {
        this.els.overlay.classList.remove('active');
    }
}

    resetForm() {
        this.els.overlay.classList.remove('active');
        this.els.form.reset();
    }

    simulateLogin(provider) {
        this.els.overlay.classList.add('active');
        this.els.statusText.textContent = `Connecting to ${provider}...`;
        setTimeout(() => {
            this.els.statusText.textContent = 'Success!';
            setTimeout(() => { alert(`Logged in with ${provider}`); this.resetForm(); }, 500);
        }, 1500);
    }
}

const app = new App();
</script>
</body>
</html>
