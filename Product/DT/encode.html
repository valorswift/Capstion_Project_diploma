<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4-to-2 Encoder Visual</title>
<style>
    /* --- CSS VARIABLES & RESET --- */
    :root {
        --bg-dark: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --card-border: rgba(255, 255, 255, 0.1);
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        
        /* Signal Colors */
        --color-data: #22d3ee;      /* Cyan for Active Inputs */
        --color-logic: #f472b6;     /* Pink for Logic/Output */
        --color-off: #334155;       /* Grey for Low */
        
        --glow-data: 0 0 12px rgba(34, 211, 238, 0.6);
        --glow-logic: 0 0 12px rgba(244, 114, 182, 0.6);
        
        --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        font-family: var(--font-family);
        background-color: var(--bg-dark);
        background-image: 
            radial-gradient(circle at 50% 0%, rgba(34, 211, 238, 0.1), transparent 50%),
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
        color: var(--text-main);
        margin: 0; 
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    h1 {
        text-align: center; 
        margin-bottom: 40px;
        font-size: 2.5rem;
        font-weight: 300;
        text-transform: uppercase;
        letter-spacing: 3px;
        background: linear-gradient(to right, #fff, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .simulator {
        display: flex; 
        gap: 40px; 
        flex-wrap: wrap; 
        justify-content: center;
        align-items: stretch;
        max-width: 1400px;
        width: 100%;
    }

    /* --- CARDS --- */
    .diagram, .panel {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        padding: 30px; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .diagram {
        flex: 2;
        min-width: 500px; 
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .panel {
        flex: 1;
        min-width: 300px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .panel h2 { 
        text-align: center; 
        margin-bottom: 25px; 
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 0.9rem;
        border-bottom: 1px solid var(--card-border);
        padding-bottom: 15px;
    }

    /* --- SVG STYLES --- */
    svg {
        width: 100%; 
        height: auto;
        max-width: 800px;
        overflow: visible;
    }

    /* Wires */
    .wire, .wire-data, .wire-logic {
        stroke: var(--color-off);
        stroke-width: 3; 
        stroke-linecap: round; 
        fill: none;
        transition: stroke 0.3s ease, filter 0.3s ease;
    }
    
    /* Specific Wire Colors */
    .wire-data.signal { stroke: var(--color-data); filter: drop-shadow(0 0 4px var(--color-data)); }
    .wire-logic.signal { stroke: var(--color-logic); filter: drop-shadow(0 0 4px var(--color-logic)); }

    /* Generic signal animation */
    .signal { stroke-dasharray: 8, 4; animation: flow 1s linear infinite; }
    @keyframes flow { to { stroke-dashoffset: -20; } }

    /* Terminals (Buttons) */
    .terminal {
        fill: #1e293b; 
        stroke: #475569; 
        stroke-width: 3; 
        cursor: pointer; 
        transition: fill 0.2s ease, stroke 0.2s ease, filter 0.2s ease;
    }

    .terminal:hover { stroke: #fff; fill: #334155; }
    .terminal.data.on { fill: var(--color-data); stroke: #fff; filter: var(--glow-data); }
    
    .indicator {
        fill: #1e293b; 
        stroke: #475569; 
        stroke-width: 3; 
        transition: all 0.3s ease;
    }
    .indicator.on { fill: var(--color-logic); stroke: #fff; filter: var(--glow-logic); }

    /* Gate Styles */
    .gate-body {
        fill: rgba(15, 23, 42, 0.9);
        stroke: #64748b;
        stroke-width: 2;
    }
    .gate-label {
        fill: var(--text-muted);
        font-size: 12px;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
        font-weight: bold;
    }

    /* --- CONTROLS --- */
    .toggle-container {
        position: absolute; 
        top: 20px; 
        right: 20px;
        display: flex; 
        align-items: center; 
        gap: 10px; 
        color: var(--text-muted);
        font-weight: 600; 
        font-size: 0.85rem; 
        z-index: 10;
        background: rgba(0,0,0,0.4);
        padding: 8px 14px;
        border-radius: 20px;
        border: 1px solid var(--card-border);
    }
    .toggle-container input[type="checkbox"] {
        width: 40px; height: 20px;
        -webkit-appearance: none; background: #334155;
        border-radius: 20px; position: relative; cursor: pointer;
        transition: background 0.3s;
    }
    .toggle-container input[type="checkbox"]:checked { background: var(--color-data); }
    .toggle-container input[type="checkbox"]::before {
        content:''; position: absolute; width: 16px; height: 16px; 
        border-radius: 50%; background: #fff; top: 2px; left: 2px; 
        transition: left 0.3s ease;
    }
    .toggle-container input[type="checkbox"]:checked::before { left: 22px; }

    /* --- TRUTH TABLE --- */
    table {
        width: 100%; 
        border-collapse: separate; 
        border-spacing: 0; 
        text-align: center; 
        font-size: 1rem;
        border-radius: 12px;
        border: 1px solid var(--card-border);
        overflow: hidden;
    }
    th, td { padding: 12px; font-weight: 600; }
    th {
        background: rgba(255,255,255,0.05);
        color: var(--text-muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        border-bottom: 1px solid var(--card-border);
    }
    tr.active {
        background: rgba(34, 211, 238, 0.15); 
        color: #fff;
    }
    
    /* Responsive */
    @media (max-width: 900px) {
        .simulator { flex-direction: column; }
        .diagram { min-width: unset; }
    }
</style>
</head>
<body>

<h1>4-to-2 Encoder</h1>

<div class="simulator">
    <div class="diagram">
        <div class="toggle-container">
            Show Gates
            <input type="checkbox" id="toggleGates"/>
        </div>

        <svg viewBox="0 0 800 500" id="svgCanvas">
            <defs>
                <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>

            <!-- CHIP VIEW (Abstract) -->
            <g id="chipView">
                <!-- Inputs I0-I3 -->
                <text x="30" y="105" class="gate-label" style="font-size:14px; fill:var(--text-muted)">I0</text>
                <circle id="chipI0" cx="60" cy="100" r="15" class="terminal data"/>
                <line id="wChipI0" x1="75" y1="100" x2="180" y2="100" class="wire-data"/>

                <text x="30" y="205" class="gate-label" style="font-size:14px; fill:var(--text-muted)">I1</text>
                <circle id="chipI1" cx="60" cy="200" r="15" class="terminal data"/>
                <line id="wChipI1" x1="75" y1="200" x2="180" y2="200" class="wire-data"/>

                <text x="30" y="305" class="gate-label" style="font-size:14px; fill:var(--text-muted)">I2</text>
                <circle id="chipI2" cx="60" cy="300" r="15" class="terminal data"/>
                <line id="wChipI2" x1="75" y1="300" x2="180" y2="300" class="wire-data"/>

                <text x="30" y="405" class="gate-label" style="font-size:14px; fill:var(--text-muted)">I3</text>
                <circle id="chipI3" cx="60" cy="400" r="15" class="terminal data"/>
                <line id="wChipI3" x1="75" y1="400" x2="180" y2="400" class="wire-data"/>

                <!-- Encoder Shape -->
                <path d="M180 50 L180 450 L620 450 L620 50 Z" fill="#1e293b" stroke="#475569" stroke-width="3"/>
                <text x="400" y="240" text-anchor="middle" fill="#fff" font-size="24px" font-weight="bold" pointer-events="none">ENCODER</text>
                <text x="400" y="270" text-anchor="middle" fill="#94a3b8" font-size="14px">4-to-2</text>

                <!-- Internal Paths (Visual Only) -->
                <path id="pathActive" d="M180,200 L400,200 L400,300 L620,300" class="wire-logic" style="visibility:hidden" fill="none"/>

                <!-- Outputs Y0, Y1 -->
                <line id="wChipY0" x1="620" y1="300" x2="740" y2="300" class="wire-logic"/>
                <circle id="chipY0" cx="740" cy="300" r="15" class="indicator"/>
                <text x="770" y="305" style="font-size:14px; fill:var(--text-muted)">Y0 (LSB)</text>

                <line id="wChipY1" x1="620" y1="200" x2="740" y2="200" class="wire-logic"/>
                <circle id="chipY1" cx="740" cy="200" r="15" class="indicator"/>
                <text x="770" y="205" style="font-size:14px; fill:var(--text-muted)">Y1 (MSB)</text>
            </g>

            <!-- GATE VIEW (Aligned) -->
            <g id="gateView" visibility="hidden">
                <!-- Inputs -->
                <circle id="gI0" cx="60" cy="60" r="12" class="terminal data"/>
                <text x="40" y="65" class="gate-label" style="fill:var(--text-muted); text-anchor:end">I0</text>
                
                <circle id="gI1" cx="60" cy="160" r="12" class="terminal data"/>
                <text x="40" y="165" class="gate-label" style="fill:var(--text-muted); text-anchor:end">I1</text>
                
                <circle id="gI2" cx="60" cy="260" r="12" class="terminal data"/>
                <text x="40" y="265" class="gate-label" style="fill:var(--text-muted); text-anchor:end">I2</text>
                
                <circle id="gI3" cx="60" cy="360" r="12" class="terminal data"/>
                <text x="40" y="365" class="gate-label" style="fill:var(--text-muted); text-anchor:end">I3</text>

                <!-- WIRES FROM INPUTS -->
                <!-- I0 is unused in standard logic, leave disconnected or grounded visually -->
                <line id="wgI0" x1="72" y1="60" x2="100" y2="60" class="wire-data" stroke-dasharray="4,4"/> 
                
                <!-- I1 goes to OR Gate for Y0 -->
                <line id="wgI1" x1="72" y1="160" x2="300" y2="160" class="wire-data"/>
                <line x1="300" y1="160" x2="300" y2="340" class="wire-data"/>
                <line x1="300" y1="340" x2="480" y2="340" class="wire-data"/> <!-- Into OR Gate 1 -->

                <!-- I2 goes to OR Gate for Y1 -->
                <line id="wgI2" x1="72" y1="260" x2="350" y2="260" class="wire-data"/>
                <line x1="350" y1="260" x2="350" y2="180" class="wire-data"/>
                <line x1="350" y1="180" x2="480" y2="180" class="wire-data"/> <!-- Into OR Gate 2 -->

                <!-- I3 splits to BOTH Gates -->
                <line id="wgI3" x1="72" y1="360" x2="250" y2="360" class="wire-data"/>
                <!-- Split point -->
                <circle cx="250" cy="360" r="4" fill="#fff"/>
                <!-- Path to OR Gate 1 (Y0) -->
                <line x1="250" y1="360" x2="250" y2="360" class="wire-data"/> <!-- dummy alignment -->
                <line x1="250" y1="360" x2="400" y2="360" class="wire-data"/>
                <line x1="400" y1="360" x2="480" y2="360" class="wire-data"/>
                
                <!-- Path to OR Gate 2 (Y1) -->
                <line x1="250" y1="360" x2="250" y2="160" class="wire-data"/>
                <line x1="250" y1="160" x2="480" y2="160" class="wire-data"/>

                <!-- GATES -->
                <!-- OR Gate 2 (Y1 Logic: I2 + I3) -->
                <path d="M480 140 Q540 140, 560 180 Q580 220, 560 220 Q540 220, 480 220 Q520 180, 480 140 Z" class="gate-body"/>
                <text x="520" y="185" class="gate-label">OR</text>
                <line id="wgY1" x1="560" y1="180" x2="680" y2="180" class="wire-logic"/>
                <circle id="gY1" cx="700" cy="180" r="12" class="indicator"/>
                <text x="720" y="185" class="gate-label" style="fill:var(--text-muted)">Y1 (MSB)</text>

                <!-- OR Gate 1 (Y0 Logic: I1 + I3) -->
                <path d="M480 320 Q540 320, 560 360 Q580 400, 560 400 Q540 400, 480 400 Q520 360, 480 320 Z" class="gate-body"/>
                <text x="520" y="365" class="gate-label">OR</text>
                <line id="wgY0" x1="560" y1="360" x2="680" y2="360" class="wire-logic"/>
                <circle id="gY0" cx="700" cy="360" r="12" class="indicator"/>
                <text x="720" y="365" class="gate-label" style="fill:var(--text-muted)">Y0 (LSB)</text>
            </g>
        </svg>
    </div>

    <div class="panel">
        <h2>Truth Table</h2>
        <table>
            <tr><th>I3</th><th>I2</th><th>I1</th><th>I0</th><th>Y1</th><th>Y0</th></tr>
            <tr id="row0"><td>0</td><td>0</td><td>0</td><td>1</td><td>0</td><td>0</td></tr>
            <tr id="row1"><td>0</td><td>0</td><td>1</td><td>0</td><td>0</td><td>1</td></tr>
            <tr id="row2"><td>0</td><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr>
            <tr id="row3"><td>1</td><td>0</td><td>0</td><td>0</td><td>1</td><td>1</td></tr>
        </table>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--card-border);">
            <h2>Logic Equations</h2>
            <div style="font-family: monospace; color: var(--text-muted); text-align: center; line-height: 1.8;">
                <div><span style="color:var(--color-logic)">Y1</span> = I<sub>2</sub> + I<sub>3</sub></div>
                <div><span style="color:var(--color-logic)">Y0</span> = I<sub>1</sub> + I<sub>3</sub></div>
            </div>
        </div>
    </div>
</div>

<script>
    // State
    let I = [0, 0, 0, 0]; // Inputs I0, I1, I2, I3
    
    const toggle = document.getElementById("toggleGates");
    const chipView = document.getElementById("chipView");
    const gateView = document.getElementById("gateView");

    // Toggle View
    toggle.addEventListener("change", () => {
        chipView.setAttribute("visibility", toggle.checked ? "hidden" : "visible");
        gateView.setAttribute("visibility", toggle.checked ? "visible" : "hidden");
        updateVisuals();
    });

    // Logic: Standard Encoder (assumes one-hot input for truth table matching)
    // But we will visualize the logic equations directly: Y0 = I1 + I3, Y1 = I2 + I3
    function calculateLogic() {
        const y0 = I[1] | I[3];
        const y1 = I[2] | I[3];
        return [y0, y1];
    }

    // Update UI
    function updateVisuals() {
        const [y0, y1] = calculateLogic();

        // Highlight Table Row (Find the highest priority active input for 'active' state visual)
        // Or highlight based on exact match for standard encoder truth table
        let activeRowIndex = -1;
        if(I[3]) activeRowIndex = 3;
        else if(I[2]) activeRowIndex = 2;
        else if(I[1]) activeRowIndex = 1;
        else if(I[0]) activeRowIndex = 0;

        document.querySelectorAll("tr").forEach(r => r.classList.remove("active"));
        if(activeRowIndex !== -1) {
            document.getElementById(`row${activeRowIndex}`).classList.add("active");
        }

        // --- UPDATE CHIP VIEW ---
        for(let i=0; i<4; i++) {
            const term = document.getElementById(`chipI${i}`);
            const wire = document.getElementById(`wChipI${i}`);
            term.classList.toggle("on", I[i] === 1);
            wire.classList.toggle("signal", I[i] === 1);
        }

        // Chip Outputs
        document.getElementById("chipY0").classList.toggle("on", y0 === 1);
        document.getElementById("wChipY0").classList.toggle("signal", y0 === 1);
        document.getElementById("chipY1").classList.toggle("on", y1 === 1);
        document.getElementById("wChipY1").classList.toggle("signal", y1 === 1);

        // Internal Animation Path (Simple visualization)
        const pathWire = document.getElementById("pathActive");
        // Only show animation if exactly one line is active to keep it clean, or just show logic flow
        if(y0 || y1) {
            // Just a generic visual path
             pathWire.style.visibility = 'visible';
             pathWire.classList.toggle("signal", true);
        } else {
             pathWire.style.visibility = 'hidden';
        }


        // --- UPDATE GATE VIEW ---
        if(toggle.checked) {
            // Inputs
            for(let i=0; i<4; i++) {
                document.getElementById(`gI${i}`).classList.toggle("on", I[i] === 1);
                // Wire I0 is disconnected visually
                if(i > 0) {
                    // We toggle the main entry wire class
                    document.getElementById(`wgI${i}`).classList.toggle("signal", I[i] === 1);
                }
            }
            
            // Gates Logic Visualization
            // Y0 = I1 | I3
            document.getElementById("gY0").classList.toggle("on", y0 === 1);
            document.getElementById("wgY0").classList.toggle("signal", y0 === 1);
            
            // Y1 = I2 | I3
            document.getElementById("gY1").classList.toggle("on", y1 === 1);
            document.getElementById("wgY1").classList.toggle("signal", y1 === 1);

            // Note: Because SVG wires are drawn statically for alignment, 
            // we need to toggle specific wire segments if we want the signal to "flow" through the path.
            // For this simplified encoder, the CSS class 'signal' on the main input line wgI1..wgI3
            // and the output lines wgY0..wgY1 provides sufficient feedback.
        }
    }

    // Input Handlers
    function addListeners() {
        // Chip Inputs
        for(let i=0; i<4; i++) {
            document.getElementById(`chipI${i}`).onclick = () => {
                // Toggle behavior: Turn off others to simulate standard encoder switch
                // Or just toggle freely for logic demonstration.
                // Let's do simple toggle:
                I[i] = I[i] ? 0 : 1; 
                updateVisuals();
            };
            // Gate Inputs
            document.getElementById(`gI${i}`).onclick = () => {
                I[i] = I[i] ? 0 : 1;
                updateVisuals();
            };
        }
    }

    // Init
    addListeners();
    updateVisuals();

</script>
</body>
</html>
