<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Visualizer | PROTO A</title>
    <!-- Vis.js -->
    <script src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <link href="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.css" rel="stylesheet">
    <!-- Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        /* --- Theme Variables (Tree Theme: Emerald/Teal) --- */
        :root {
            --bg-body: #f0f4f8;
            --bg-card: rgba(255, 255, 255, 0.65);
            --bg-glass: rgba(255, 255, 255, 0.4);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #10b981; /* Emerald Green */
            --secondary: #0f766e; /* Darker Teal */
            --border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --shadow-hover: 0 8px 32px 0 rgba(16, 185, 129, 0.2);
            --accent-delete: #ef4444;
            --accent-highlight: #f59e0b;
        }

        body.dark {
            --bg-body: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-glass: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: radial-gradient(circle at center, var(--bg-body), #cbd5e1);
            color: var(--text-main);
            transition: background 0.3s ease;
        }
        
        body.dark {
            background: radial-gradient(circle at center, #0f172a, #1e293b);
        }

        /* --- Main Layout --- */
        .container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* --- Left Sidebar (Stats) --- */
        .sidebar-left {
            width: 260px;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
            box-shadow: var(--shadow);
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-top: 5px; }

        .legend-item {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        /* --- Center Graph Area --- */
        .graph-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 20;
            pointer-events: none;
        }
        
        .nav-btn {
            pointer-events: auto;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: var(--shadow);
        }
        .nav-btn:hover { background: var(--primary); color: white; }

        /* Floating Controls Panel */
        .controls-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 900px;
            
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow-hover);
            
            z-index: 15;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .control-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        input[type="number"] {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 10px;
            outline: none;
            width: 120px;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s;
            color: white;
            white-space: nowrap;
        }

        .btn-primary { background: linear-gradient(135deg, var(--primary), #059669); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
        .btn-traverse { background: linear-gradient(135deg, var(--secondary), #0d9488); box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3); }
        
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: grayscale(1); }

        .divider { width: 1px; height: 30px; background: var(--border); margin: 0 5px; }

        #tree { width: 100%; height: 100%; background: transparent; }

        /* --- Right Sidebar (Logs) --- */
        .sidebar-right {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 300px;
            padding: 20px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 30;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
        }
        .sidebar-right.open { transform: translateX(0); }

        .log-container {
            height: calc(100% - 60px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 10px;
        }

        .log-entry {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            border-left: 3px solid var(--primary);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar-left { display: none; }
            .controls-panel { width: 98%; bottom: 10px; max-height: 45vh; overflow-y: auto; }
            .control-row { flex-direction: column; align-items: stretch; }
            .divider { display: none; }
            .input-group { flex-direction: row; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
  <!-- Left Sidebar -->
  <div class="sidebar-left">
    <h3 style="margin-bottom: 20px; color: var(--primary);"><i class="ri-git-branch-line"></i> BST Stats</h3>
    
    <div class="stat-card">
        <div class="stat-label">Total Nodes</div>
        <div class="stat-value" id="nodeCount">0</div>
    </div>
    
    <div class="stat-card">
        <div class="stat-label">Tree Height</div>
        <div class="stat-value" id="treeHeight">0</div>
    </div>

    <div class="stat-card" style="flex: 1; display: flex; flex-direction: column; justify-content: flex-start;">
        <div class="stat-label" style="margin-bottom: 15px;">Legend</div>
        <div class="legend-item"><div class="dot" style="background: var(--primary);"></div> Standard Node</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-highlight);"></div> Visiting / Found</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-delete);"></div> Deleting</div>
    </div>
  </div>

  <!-- Center Graph Wrapper -->
  <div class="graph-wrapper">
    <div class="top-bar">
        <button class="nav-btn" onclick="goBack()"><i class="ri-arrow-left-line"></i></button>
        <button class="nav-btn" onclick="toggleTheme()" id="themeBtn"><i class="ri-moon-line" id="themeIcon"></i></button>
    </div>

    <div id="tree"></div>

    <div class="controls-panel">
        <!-- Core Operations -->
        <div class="control-row">
            <div class="input-group">
                <input type="number" id="nodeValue" placeholder="Value (Int)" onkeydown="if(event.key==='Enter') insertNode()">
                <button class="btn btn-primary" onclick="insertNode()"><i class="ri-add-line"></i> Insert</button>
                <button class="btn btn-danger" onclick="deleteNode()"><i class="ri-delete-bin-line"></i> Delete</button>
                <button class="btn btn-traverse" onclick="findNode()"><i class="ri-search-eye-line"></i> Find</button>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Traversals -->
        <div class="control-row">
            <button class="btn btn-traverse" onclick="traverse('inorder')">In-Order</button>
            <button class="btn btn-traverse" onclick="traverse('preorder')">Pre-Order</button>
            <button class="btn btn-traverse" onclick="traverse('postorder')">Post-Order</button>
            <button class="btn btn-traverse" onclick="traverse('levelorder')">Level-Order</button>
            <button class="btn btn-danger" style="margin-left: auto; background: #64748b;" onclick="resetTree()"><i class="ri-refresh-line"></i> Reset</button>
        </div>
    </div>

    <!-- Log Toggle -->
    <button class="nav-btn" style="position: absolute; top: 20px; right: 20px; pointer-events: auto; background: var(--primary); color: white;" onclick="toggleLog()">
        <i class="ri-file-list-3-line"></i>
    </button>
  </div>

  <!-- Right Sidebar -->
  <div class="sidebar-right" id="sidebarRight">
    <h3>Operation Log</h3>
    <div class="log-container" id="logContainer"></div>
  </div>
</div>

<script>
  /* --- 1. Theme & UI Logic --- */
  const themeIcon = document.getElementById('themeIcon');
  const body = document.body;
  
  const savedTheme = localStorage.getItem('theme');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (savedTheme === 'dark' || (!savedTheme && systemDark)) applyTheme(true);

  function toggleTheme() {
    const isDark = body.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    applyTheme(isDark);
    updateNetworkTheme(isDark);
  }

  function applyTheme(isDark) {
    if (isDark) { body.classList.add('dark'); themeIcon.className = 'ri-sun-line'; }
    else { body.classList.remove('dark'); themeIcon.className = 'ri-moon-line'; }
  }

  function toggleLog() { document.getElementById('sidebarRight').classList.toggle('open'); }
  function goBack() { window.location.href = 'nonlinear.html'; }

  function log(msg, type='info') {
    const container = document.getElementById('logContainer');
    const div = document.createElement('div');
    div.className = 'log-entry';
    if(type === 'error') div.style.borderLeftColor = 'var(--accent-delete)';
    if(type === 'success') div.style.borderLeftColor = 'var(--primary)';
    
    const time = new Date().toLocaleTimeString([], {hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit'});
    div.innerHTML = `<span style="opacity:0.6; font-size:0.75rem; display:block; margin-bottom:2px;">${time}</span>${msg}`;
    container.prepend(div);
  }

  /* --- 2. BST Data Structure --- */
  class TreeNode {
    constructor(value) {
      this.value = value;
      this.left = null;
      this.right = null;
      this.id = value.toString(); // Using value as ID for Vis.js
    }
  }

  class BST {
    constructor() { this.root = null; }

    insert(value) {
      const newNode = new TreeNode(value);
      if (!this.root) { this.root = newNode; return true; }
      let current = this.root;
      while (true) {
        if (value === current.value) return false; // No duplicates
        if (value < current.value) {
          if (!current.left) { current.left = newNode; return true; }
          current = current.left;
        } else {
          if (!current.right) { current.right = newNode; return true; }
          current = current.right;
        }
      }
    }

    find(value) {
      if (!this.root) return null;
      let current = this.root;
      while (current) {
        if (value === current.value) return current;
        if (value < current.value) current = current.left;
        else current = current.right;
      }
      return null;
    }

    delete(value) {
      this.root = this._deleteNode(this.root, value);
    }

    _deleteNode(node, key) {
      if (node === null) return null;
      if (key < node.value) node.left = this._deleteNode(node.left, key);
      else if (key > node.value) node.right = this._deleteNode(node.right, key);
      else {
        // Node found
        if (!node.left && !node.right) return null; // Leaf
        if (!node.left) return node.right; // One child
        if (!node.right) return node.left; // One child
        // Two children: Get min of right subtree
        let temp = this._findMin(node.right);
        node.value = temp.value;
        node.id = temp.value; // Update ID for Vis.js
        node.right = this._deleteNode(node.right, temp.value);
      }
      return node;
    }

    _findMin(node) {
      while (node.left) node = node.left;
      return node;
    }

    getHeight(node = this.root) {
      if (!node) return 0;
      return 1 + Math.max(this.getHeight(node.left), this.getHeight(node.right));
    }
    
    getCount(node = this.root) {
        if(!node) return 0;
        return 1 + this.getCount(node.left) + this.getCount(node.right);
    }

    // Traversal Generators for animation
    *inOrder(node = this.root) {
      if (node) { yield* this.inOrder(node.left); yield node; yield* this.inOrder(node.right); }
    }
    *preOrder(node = this.root) {
      if (node) { yield node; yield* this.preOrder(node.left); yield* this.preOrder(node.right); }
    }
    *postOrder(node = this.root) {
      if (node) { yield* this.postOrder(node.left); yield* this.postOrder(node.right); yield node; }
    }
    *levelOrder() {
      if (!this.root) return;
      const queue = [this.root];
      while (queue.length) {
        const node = queue.shift();
        yield node;
        if (node.left) queue.push(node.left);
        if (node.right) queue.push(node.right);
      }
    }
  }

  const tree = new BST();
  let isAnimating = false;

  /* --- 3. Vis.js Integration --- */
  const nodesDataset = new vis.DataSet([]);
  const edgesDataset = new vis.DataSet([]);
  const container = document.getElementById('tree');

  const getOptions = (isDark) => {
    const color = isDark ? '#1e293b' : '#ffffff';
    const nodeColor = isDark ? '#10b981' : '#059669';
    
    return {
      nodes: {
        shape: 'dot',
        size: 25,
        font: { color: isDark ? '#fff' : '#1e293b', size: 16, face: 'Inter' },
        color: { background: nodeColor, border: color, highlight: { background: '#f59e0b', border: '#fff' } },
        borderWidth: 2,
        shadow: true
      },
      edges: {
        arrows: 'to',
        color: { color: isDark ? '#64748b' : '#cbd5e1' },
        width: 2,
        smooth: { type: 'cubicBezier' }
      },
      layout: {
        hierarchical: {
          enabled: true,
          direction: 'UD',
          sortMethod: 'directed',
          levelSeparation: 100,
          nodeSpacing: 150
        }
      },
      physics: { enabled: false }, // Disable physics for strict tree layout
      interaction: { hover: true, tooltipDelay: 200 }
    };
  };

  let network = new vis.Network(container, { nodes: nodesDataset, edges: edgesDataset }, getOptions(body.classList.contains('dark')));

  function updateNetworkTheme(isDark) {
    network.setOptions(getOptions(isDark));
  }

  function drawTree() {
    nodesDataset.clear();
    edgesDataset.clear();

    if (!tree.root) {
        updateStats();
        return;
    }

    // Recursive function to build vis.js data
    function buildVisData(node) {
      if (!node) return;
      nodesDataset.add({ id: node.id, label: node.value.toString() });
      if (node.left) {
        edgesDataset.add({ from: node.id, to: node.left.id });
        buildVisData(node.left);
      }
      if (node.right) {
        edgesDataset.add({ from: node.id, to: node.right.id });
        buildVisData(node.right);
      }
    }
    buildVisData(tree.root);
    updateStats();
  }

  function updateStats() {
      document.getElementById('nodeCount').innerText = tree.getCount();
      document.getElementById('treeHeight').innerText = tree.getHeight();
  }

  /* --- 4. Operation Handlers --- */
  
  async function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

  async function insertNode() {
    if(isAnimating) return;
    const val = parseInt(document.getElementById('nodeValue').value);
    if (isNaN(val)) return log("Please enter a valid integer.", 'error');

    const success = tree.insert(val);
    if (success) {
        log(`Inserted value <b>${val}</b> into the tree.`, 'success');
        drawTree();
        document.getElementById('nodeValue').value = '';
        
        // Highlight new node
        await sleep(300);
        nodesDataset.update({ id: val.toString(), color: { background: '#f59e0b', border: '#fff' } });
        await sleep(800);
        drawTree(); // Reset colors
    } else {
        log(`Value ${val} already exists!`, 'error');
    }
  }

  async function deleteNode() {
    if(isAnimating) return;
    const val = parseInt(document.getElementById('nodeValue').value);
    if (isNaN(val)) return log("Enter value to delete.", 'error');

    if (!tree.find(val)) return log(`Value ${val} not found.`, 'error');

    log(`Deleting node <b>${val}</b>...`, 'info');
    
    // Visual feedback before deletion
    nodesDataset.update({ id: val.toString(), color: { background: '#ef4444', border: '#fff' } });
    await sleep(600);

    tree.delete(val);
    drawTree();
    log(`Deletion complete.`, 'success');
    document.getElementById('nodeValue').value = '';
  }

  async function findNode() {
    if(isAnimating) return;
    const val = parseInt(document.getElementById('nodeValue').value);
    if (isNaN(val)) return log("Enter value to find.", 'error');

    log(`Searching for <b>${val}</b>...`);
    
    // Highlight path logic (Simulated)
    let current = tree.root;
    isAnimating = true;
    
    while(current) {
        nodesDataset.update({ id: current.id.toString(), color: { background: '#f59e0b', border: '#fff' } });
        await sleep(500);
        
        if(current.value === val) {
            log(`Found node <b>${val}</b>!`, 'success');
            break;
        }
        // Revert color
        nodesDataset.update({ id: current.id.toString(), color: { background: '#10b981', border: '#fff' } });
        
        if(val < current.value) current = current.left;
        else current = current.right;
        
        if(!current) log(`Value <b>${val}</b> not found in tree.`, 'error');
    }
    isAnimating = false;
    setTimeout(drawTree, 1000); // Reset colors
  }

  function resetTree() {
    if(isAnimating) return;
    tree.root = null;
    drawTree();
    log("Tree cleared.", 'info');
  }

  async function traverse(type) {
    if(isAnimating || !tree.root) return;
    isAnimating = true;
    
    let generator;
    let title = "";
    
    if (type === 'inorder') { generator = tree.inOrder(); title = "In-Order (Left, Root, Right)"; }
    else if (type === 'preorder') { generator = tree.preOrder(); title = "Pre-Order (Root, Left, Right)"; }
    else if (type === 'postorder') { generator = tree.postOrder(); title = "Post-Order (Left, Right, Root)"; }
    else if (type === 'levelorder') { generator = tree.levelOrder(); title = "Level-Order (BFS)"; }

    log(`Starting <b>${title}</b> traversal...`);
    const result = [];

    for (const node of generator) {
        // Highlight
        nodesDataset.update({ id: node.id.toString(), color: { background: '#f59e0b', border: '#fff' } });
        result.push(node.value);
        await sleep(600);
        // Un-highlight
        nodesDataset.update({ id: node.id.toString(), color: { background: '#10b981', border: '#fff' } });
    }

    log(`Traversal Result: [ ${result.join(', ')} ]`, 'success');
    isAnimating = false;
  }

  // Initialize with some data
  [50, 30, 70, 20, 40, 60, 80].forEach(v => tree.insert(v));
  drawTree();
  log("System initialized with sample data.");

</script>
</body>
</html>
